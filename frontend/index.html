  <script>
    (function() {
      var ua = navigator.userAgent || '';
      // Skip Firefox / Opera where meta[name="theme-color"] isn't supported
      if (/Firefox|FxiOS|OPR|Opera/.test(ua)) return;

      var m = document.createElement('meta');
      m.name = 'theme-color';

      var darkQuery = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
      m.content = darkQuery && darkQuery.matches ? '#020810' : '#ffffff';
      document.head.appendChild(m);

      // Update on color-scheme changes
      if (darkQuery) {
        if (typeof darkQuery.addEventListener === 'function') {
          darkQuery.addEventListener('change', function(e){ m.content = e.matches ? '#020810' : '#ffffff'; });
        } else if (typeof darkQuery.addListener === 'function') {
          darkQuery.addListener(function(e){ m.content = e.matches ? '#020810' : '#ffffff'; });
        }
      }
    })();
  </script>

  <!-- ═══════════════════════════════════════
       PRODUCTION HACKS (Log Suppression)
  ═══════════════════════════════════════ -->
  <script>
    // 1. Disable Workbox dev logs
    window.__WB_DISABLE_DEV_LOGS = true;

    // 2. Intercept and suppress Vite HMR / WebSocket errors in production
    const originalConsoleLog = console.log;
    const originalConsoleError = console.error;

    console.log = function () {
      const msg = arguments[0];
      if (typeof msg === 'string') {
        // Suppress Workbox / Vite logs
        if (msg.includes('workbox') || msg.includes('[vite]')) return;
      }
      originalConsoleLog.apply(console, arguments);
    };

    console.error = function () {
      const msg = arguments[0];
      if (typeof msg === 'string') {
        // Suppress Vite websocket errors
        if (
          msg.includes('WebSocket connection to') ||
          msg.includes('failed to connect to websocket') ||
          msg.includes('[vite] failed to connect') ||
          msg.includes('[vite] TypeError: Cannot read properties of undefined (reading \'send\')') ||
          msg.includes('WebSocket')
        ) {
          return;
        }
      }
      originalConsoleError.apply(console, arguments);
    };
  </script>
