<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.08"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Grid base -->
  <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
    <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(6,182,212,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="800" height="800" fill="url(#grid)"/>

  <!-- Circuit Lines - Horizontal -->
  <line x1="0" y1="160" x2="200" y2="160" stroke="url(#lineGrad)" stroke-width="1"/>
  <line x1="240" y1="160" x2="560" y2="160" stroke="url(#lineGrad)" stroke-width="1"/>
  <line x1="600" y1="160" x2="800" y2="160" stroke="url(#lineGrad)" stroke-width="1"/>

  <line x1="100" y1="320" x2="400" y2="320" stroke="url(#lineGrad)" stroke-width="1"/>
  <line x1="440" y1="320" x2="700" y2="320" stroke="url(#lineGrad)" stroke-width="1"/>

  <line x1="0" y1="480" x2="300" y2="480" stroke="url(#lineGrad)" stroke-width="1"/>
  <line x1="340" y1="480" x2="800" y2="480" stroke="url(#lineGrad)" stroke-width="1"/>

  <line x1="150" y1="640" x2="650" y2="640" stroke="url(#lineGrad)" stroke-width="1"/>

  <!-- Circuit Lines - Vertical -->
  <line x1="160" y1="0" x2="160" y2="240" stroke="url(#lineGrad)" stroke-width="1"/>
  <line x1="160" y1="280" x2="160" y2="800" stroke="url(#lineGrad)" stroke-width="1"/>

  <line x1="400" y1="80" x2="400" y2="400" stroke="url(#lineGrad)" stroke-width="1"/>
  <line x1="400" y1="440" x2="400" y2="720" stroke="url(#lineGrad)" stroke-width="1"/>

  <line x1="640" y1="0" x2="640" y2="560" stroke="url(#lineGrad)" stroke-width="1"/>
  <line x1="640" y1="600" x2="640" y2="800" stroke="url(#lineGrad)" stroke-width="1"/>

  <!-- Corner turns -->
  <path d="M 200 160 Q 240 160 240 200" fill="none" stroke="url(#lineGrad)" stroke-width="1"/>
  <path d="M 560 160 Q 600 160 600 200" fill="none" stroke="url(#lineGrad)" stroke-width="1"/>
  <path d="M 400 320 Q 440 320 440 360" fill="none" stroke="url(#lineGrad)" stroke-width="1"/>
  <path d="M 300 480 Q 340 480 340 440" fill="none" stroke="url(#lineGrad)" stroke-width="1"/>
  <path d="M 240 200 L 240 320" fill="none" stroke="url(#lineGrad)" stroke-width="1"/>
  <path d="M 600 200 L 600 320" fill="none" stroke="url(#lineGrad)" stroke-width="1"/>

  <!-- Nodes (circuit junctions) -->
  <circle cx="160" cy="160" r="4" fill="#06b6d4" opacity="0.5"/>
  <circle cx="160" cy="160" r="8" fill="url(#nodeGlow)"/>

  <circle cx="400" cy="160" r="3" fill="#06b6d4" opacity="0.4"/>
  <circle cx="400" cy="160" r="6" fill="url(#nodeGlow)"/>

  <circle cx="640" cy="160" r="4" fill="#06b6d4" opacity="0.5"/>
  <circle cx="640" cy="160" r="8" fill="url(#nodeGlow)"/>

  <circle cx="240" cy="320" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="240" cy="320" r="6" fill="url(#nodeGlow)"/>

  <circle cx="400" cy="320" r="5" fill="#06b6d4" opacity="0.6"/>
  <circle cx="400" cy="320" r="10" fill="url(#nodeGlow)"/>

  <circle cx="640" cy="320" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="640" cy="320" r="6" fill="url(#nodeGlow)"/>

  <circle cx="160" cy="480" r="4" fill="#06b6d4" opacity="0.5"/>
  <circle cx="160" cy="480" r="8" fill="url(#nodeGlow)"/>

  <circle cx="400" cy="480" r="3" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="400" cy="480" r="6" fill="url(#nodeGlow)"/>

  <circle cx="640" cy="480" r="4" fill="#06b6d4" opacity="0.5"/>
  <circle cx="640" cy="480" r="8" fill="url(#nodeGlow)"/>

  <circle cx="160" cy="640" r="3" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="400" cy="640" r="5" fill="#06b6d4" opacity="0.5"/>
  <circle cx="400" cy="640" r="10" fill="url(#nodeGlow)"/>
  <circle cx="640" cy="640" r="3" fill="#8b5cf6" opacity="0.3"/>

  <!-- Small IC chip shapes -->
  <rect x="385" y="305" width="30" height="30" rx="3" fill="none" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <rect x="389" y="309" width="22" height="22" rx="2" fill="rgba(6,182,212,0.03)"/>

  <rect x="145" y="145" width="30" height="30" rx="3" fill="none" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
  <rect x="149" y="149" width="22" height="22" rx="2" fill="rgba(139,92,246,0.03)"/>

  <rect x="625" y="465" width="30" height="30" rx="3" fill="none" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <rect x="629" y="469" width="22" height="22" rx="2" fill="rgba(6,182,212,0.03)"/>

  <!-- Data flow dots along lines -->
  <circle cx="80" cy="160" r="1.5" fill="#06b6d4" opacity="0.8">
    <animate attributeName="cx" values="0;200" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="320" r="1.5" fill="#8b5cf6" opacity="0.8">
    <animate attributeName="cx" values="440;700" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="300" r="1.5" fill="#06b6d4" opacity="0.8">
    <animate attributeName="cy" values="280;480" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="640" cy="200" r="1.5" fill="#8b5cf6" opacity="0.6">
    <animate attributeName="cy" values="0;560" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="8s" repeatCount="indefinite"/>
  </circle>
</svg>
