server {
    listen 80;
    listen [::]:80;
    server_name youssefalsherief.tech www.youssefalsherief.tech;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name youssefalsherief.tech www.youssefalsherief.tech;

    # ── SSL (update paths to your certificate) ──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/youssefalsherief.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/youssefalsherief.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # ── Root: serve the Vite production build ───────────────────────────────
    root /var/www/alsherief-tech-canvas/frontend/dist;
    index index.html;

    # ── Compression ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json application/xml
        image/svg+xml font/woff2;

    brotli on;
    brotli_comp_level 6;
    brotli_types
        text/plain text/css text/javascript
        application/javascript application/json application/xml
        image/svg+xml font/woff2;

    # ── Cache: hashed assets live forever ───────────────────────────────────
    # Vite adds content hashes to all JS/CSS filenames in assets/
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }

    # ── Cache: PWA service worker — must revalidate every time ──────────────
    location ~* (sw\.js|workbox-.*\.js)$ {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Cache: images ───────────────────────────────────────────────────────
    location ~* \.(webp|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public";
        add_header Vary "Accept-Encoding";
    }

    # ── Cache: fonts ────────────────────────────────────────────────────────
    location ~* \.(woff2|woff|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # ── SPA fallback — all routes serve index.html ──────────────────────────
    # Vite React Router handles routing on the client side
    location / {
        try_files $uri $uri/ /index.html;

        # index.html itself must not be cached (it changes on every deploy)
        location = /index.html {
            expires off;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
